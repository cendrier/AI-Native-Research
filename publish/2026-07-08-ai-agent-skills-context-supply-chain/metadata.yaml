selection_rationale: >-
  Selected because it moves the daily series to a new layer of AI-native engineering infrastructure: skills as reusable, mutable context dependencies for coding agents.
  The paper is recent, freely accessible, empirical, and concrete: it studies 18,463 centralized skills, 23,199 personal-use skills, 5,876 GitHub repositories,
  and 3,709 reuse links. It gives practical guidance for building an internal skills registry, ownership model, validation workflow, and drift control loop.

