summary: >-
  A July 1, 2026 arXiv paper studies AI agent skills as engineered artifacts rather than just capabilities. It mines 18,463 centralized skills from skills.sh,
  23,199 personal-use skills from 5,876 GitHub repositories, and 3,709 reuse links. The key finding is that skills are often copied once, rarely synchronized,
  and locally maintained mostly through additive changes. For AI Native Engineering, this implies that internal agent skills need dependency-like governance:
  versioning, ownership, activation tracing, validation, compatibility metadata, source-of-truth references, and drift alerts.

