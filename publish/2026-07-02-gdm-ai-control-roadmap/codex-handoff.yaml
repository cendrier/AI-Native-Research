codex_instructions:
  - Read docs/CODEX_FEISHU_PUBLISHING_RUNBOOK.md before publishing.
  - Read docs/AI_NATIVE_RESEARCH_VISUAL_STYLE_V1.md before generating any visual card.
  - Generate all visual cards in AI Native Research V1 style.
  - Use source images only as evidence screenshots; do not redesign them as decorative posters.
  - Insert visuals at the exact locations specified above, not all at the end.
  - Publish the Feishu document with the target title.
  - After successful Feishu publish, update publish-status.yaml to status: published and include feishu_url, published_at, generated_assets, and any notes.
