quality_checklist:
  - Article contains dedicated Tier 0 section.
  - 原文信息 contains only title, source, link, and publication date.
  - Reader-facing article does not include Editor's Note, 为什么值得读, Case, or Pattern sections.
  - Article follows source structure and avoids full translation.
  - Visuals include at least one source evidence image and three or four generated cards.
  - Final Feishu document is readable with normal paragraph spacing.