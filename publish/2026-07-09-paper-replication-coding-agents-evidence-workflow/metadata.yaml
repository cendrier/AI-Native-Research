summary: >-
  A July 2, 2026 arXiv paper introduces Paper-replication, a coding-agent skill that turns paper replication into a target-level evidence task. Instead of trusting an agent's
  final message, the workflow requires a persistent workspace, reproduction matrix, task ledger, specification files, run records, provenance records, comparison evidence,
  report coverage, and validation checks. In twelve independent runs across four scientific machine-learning papers, all workspaces passed the completion gate and 158 recorded targets
  were matched with report coverage. For AI Native Engineering, the lesson is that production agent workflows should produce auditable evidence, not just outputs.

