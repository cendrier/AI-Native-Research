source_images:
  plan_file: "publish/2026-07-09-paper-replication-coding-agents-evidence-workflow/assets/source-images.yaml"
  instructions:
    - "Capture the arXiv title/date/abstract block as a source-proof screenshot."
    - "Capture Figure 1 from the PDF because it shows the three-layer workflow: agent work, workspace records, validation checks."
    - "Capture Figure 4 from the PDF because it shows scalar fidelity and run-to-run variation."
    - "Capture the GitHub release bundle README because it proves the skill, case-study workspaces, and analysis scripts are available."
    - "Use source screenshots as proof links and supporting evidence; the reader-facing explanatory visuals should be the four custom cards."

codex_execution_instructions:
  - "Read source.md and keep the reader-facing structure exactly as requested: 原文信息、核心洞察、重点内容、给我们的启示、延伸阅读."
  - "Do not add Editor's Note, 为什么值得读, Case, or Pattern sections to the reader-facing Feishu document."
  - "Do not add a ⭐ Tier 0 Special Attention section because metadata marks this run as no_dedicated_reader_section."
  - "Generate the four visual cards from the specs and insert each card at its explicit insertion location. Do not place all images at the end."
  - "Use normal paragraph spacing; avoid excessive line breaks."
  - "Preserve the nuance: Paper-replication is a method and case-study workflow, not proof that agents can fully reproduce all scientific papers."
  - "Preserve the main interpretation: production agent workflows should produce auditable evidence and pass external validation gates, not merely produce confident final messages."
  - "When using the paper's figures, crop tightly and label them as source evidence rather than custom illustrations."
  - "After publishing to Feishu, update publish-status.yaml with feishu_url, published_at, generated_asset_paths, source_screenshot_paths, and any manual edits."
  - "If upload fails, leave status as blocked and include the exact failure reason."

