summary: >-
  A July 2, 2026 arXiv paper identifies 1,888 OSS projects with visible Cursor or Claude Code adoption and runs a main difference-in-differences analysis on
  603 established adopters with pre-adoption history. It finds agent adoption modestly increases code complexity but does not measurably reduce newcomer inflow,
  onboarding, retention, or beginner-task supply. The practical takeaway is to manage AI coding adoption with both velocity metrics and human participation metrics.

