files:
  root: "publish/2026-06-30-detecting-ai-coding-agents-oss"
  markdown: "publish/2026-06-30-detecting-ai-coding-agents-oss/README.md"
  metadata: "publish/2026-06-30-detecting-ai-coding-agents-oss/metadata.yaml"
  source: "publish/2026-06-30-detecting-ai-coding-agents-oss/source.md"
